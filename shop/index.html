<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nick Knacks</title>

    <style>
        :root {
            --neon-pink: #ff4df0;
            --neon-blue: #4df3ff;
            --neon-green: #4dff7a;
            --dark-bg: rgba(0, 0, 0, 0.65);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: url('../assets/img/nickknack.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
        }

        /* NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: var(--dark-bg);
            backdrop-filter: blur(6px);
            border-bottom: 2px solid var(--neon-blue);
        }

        nav .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--neon-pink);
            text-shadow: 0 0 8px var(--neon-pink);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav ul li a {
            color: var(--neon-blue);
            text-decoration: none;
            font-size: 1.1rem;
            text-shadow: 0 0 6px var(--neon-blue);
        }

        nav ul li a:hover {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }

        /* HEADER */
        header {
            padding: 40px 20px;
            text-align: center;
            background: var(--dark-bg);
            backdrop-filter: blur(6px);
            border-bottom: 2px solid var(--neon-pink);
        }

        h1 {
            margin: 0;
            font-size: 3rem;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* PRODUCT GRID */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: var(--dark-bg);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            backdrop-filter: blur(6px);
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 12px var(--neon-blue);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 0 18px var(--neon-pink);
        }

        .product-image {
            width: 100%;
            border-radius: 8px;
        }

        .caption {
            margin-top: 10px;
            font-size: 1.2rem;
            color: var(--neon-pink);
            text-shadow: 0 0 6px var(--neon-pink);
        }

        .price {
            margin-top: 5px;
            font-size: 1.1rem;
            color: var(--neon-green);
            text-shadow: 0 0 6px var(--neon-green);
        }

        .buy-btn {
            margin-top: 12px;
            padding: 10px 16px;
            background-color: var(--neon-blue);
            color: #000;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            text-shadow: 0 0 4px #fff;
            box-shadow: 0 0 10px var(--neon-blue);
            transition: 0.2s ease;
        }

        .buy-btn:hover {
            background-color: var(--neon-green);
            box-shadow: 0 0 14px var(--neon-green);
        }

        footer {
            margin-top: 60px;
            padding: 20px;
            text-align: center;
            background: var(--dark-bg);
            border-top: 2px solid var(--neon-blue);
            backdrop-filter: blur(6px);
            color: var(--neon-blue);
            text-shadow: 0 0 6px var(--neon-blue);
        }
    </style>
</head>

<body>
<a href="../" class="abz-home" style="position:fixed;top:14px;left:14px;z-index:2000000;font-family:'JetBrains Mono',Consolas,monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#00ff66;background:rgba(0,0,0,.75);border:1px solid rgba(0,255,102,.45);border-radius:999px;padding:7px 13px;text-decoration:none;backdrop-filter:blur(8px);box-shadow:0 0 18px rgba(0,255,102,.28)">&#8592; a bit bizaare</a>

    <!-- NAVBAR -->
    <nav>
        <div class="logo">Nick Knacks</div>
        <ul>
            <li><a href="#">Shop</a></li>
            <li><a href="#">Flower Party</a></li>
            <li><a href="#" id="cart-link">Cart (0)</a></li>
        </ul>
    </nav>

    <!-- HEADER -->
    <header>
        <h1>Neon Knick‑Knacks & Cultural Treasures</h1>
    </header>

    <div class="container">

        <div class="gallery">

            <div class="product-card">
                <a href="#"><img src="../assets/img/flowerpower.png" class="product-image"></a>
                <p class="caption">Flower Power</p>
                <p class="price">$4.99</p>
                <button class="buy-btn" onclick="addToCart()">Add to Cart</button>
            </div>

            <div class="product-card">
                <a href="#"><img src="../assets/img/pot.png" class="product-image"></a>
                <p class="caption">Flower Party</p>
                <p class="price">$4.99</p>
                <button class="buy-btn" onclick="addToCart()">Add to Cart</button>
            </div>

            <div class="product-card">
                <a href="#"><img src="../assets/img/tree.png" class="product-image"></a>
                <p class="caption">Become a Tree</p>
                <p class="price">$4.99</p>
                <button class="buy-btn" onclick="addToCart()">Add to Cart</button>
            </div>

            <div class="product-card">
                <a href="#"><img src="../assets/img/revolution.png" class="product-image"></a>
                <p class="caption">Life is the Revolution</p>
                <p class="price">$4.99</p>
                <button class="buy-btn" onclick="addToCart()">Add to Cart</button>
            </div>

        </div>

    </div>

    <footer>
        © 2026 Nick Knacks — Handmade artifacts from a neon world.
    </footer>

    <script>
        let cartCount = 0;

        function addToCart() {
            cartCount++;
            document.getElementById("cart-link").innerText = `Cart (${cartCount})`;
        }
    </script>

</body>
</html>
